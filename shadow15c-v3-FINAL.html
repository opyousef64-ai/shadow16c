<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow 15C AI Trading System</title>
    
    <!-- Meta Tags -->
    <meta name="description" content="Shadow 15C AI - نظام تداول ذكي">
    <meta name="author" content="Shadow 15C Team">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0e27;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }
        
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 2px solid #e94560;
        }
        
        h1 {
            color: #e94560;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        
        .info {
            background: rgba(233, 69, 96, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        
        .success {
            display: none;
            background: linear-gradient(135deg, #27ae60, #229954);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            animation: fadeIn 0.5s ease;
            margin-top: 20px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        button {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
            margin-top: 15px;
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.6);
        }
        
        a {
            color: #00d9ff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 15px;
            display: inline-block;
        }
        
        /* Contact Info */
        .contact-info {
            margin-top: 30px;
            font-size: 1rem;
            color: #b8b8b8;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎯 Shadow 15C AI</h1>
        
        <div class="info">
            <p><strong>📧 البريد:</strong> shadowcaiyoyo@gmail.com</p>
            <p><strong>💬 Telegram:</strong> t.me/Shadow15C_Community</p>
            <p><strong>🐦 Twitter:</strong> @Shadow15C_AI</p>
        </div>
        
        <form action="https://formspree.io/f/xxxxx" method="POST">
            <input type="hidden" name="_subject" value="تسجل جديد">
            <input type="email" name="email" placeholder="بريدك الإلكتروني" required style="
                width: 100%; 
                padding: 15px; 
                margin: 10px 0; 
                border: 2px solid rgba(255,255,255,0.2); 
                border-radius: 10px; 
                font-family: 'Cairo', sans-serif;
                font-size: 1rem;
                direction: rtl;
                text-align: right;
            ">
            
            <button type="submit">إرسال</button>
        </form>
        
        <div class="success" id="successMessage">
            ✅ تم التسجيل بنجاح!
        </div>
    </div>
</body>
</html>
